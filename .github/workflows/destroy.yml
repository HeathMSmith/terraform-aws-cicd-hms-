name: Terraform Destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::859535765435:role/github-terraform-role 
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Get Bucket Name
        id: bucket
        run: |
          BUCKET=$(terraform output -raw demo_bucket || echo "")
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
        working-directory: terraform

      - name: Empty S3 Bucket
        if: steps.bucket.outputs.bucket != ''
        run: |
          echo "Emptying bucket: ${{ steps.bucket.outputs.bucket }}"
          aws s3 rm s3://${{ steps.bucket.outputs.bucket }} --recursive || true

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: terraform